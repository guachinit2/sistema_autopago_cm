# Configuración nginx para servir el frontend SPA (producción)
# Usado por el Dockerfile del frontend cuando sirve archivos estáticos

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: todas las rutas sirven index.html para client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets con hash
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
